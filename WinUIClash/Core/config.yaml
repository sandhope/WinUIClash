# WinUIClash 默认配置文件
# 请根据需要修改订阅地址和代理配置

# 基础配置
mixed-port: 7890
allow-lan: false
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
external-ui: ""

# DNS 配置
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - localhost.ptlogin2.qq.com
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

# 代理配置（示例）
proxies:
  # - name: "Proxy1"
  #   type: ss
  #   server: server.com
  #   port: 443
  #   cipher: aes-256-gcm
  #   password: "password"

# 代理组
proxy-groups:
  - name: "Proxy"
    type: select
    proxies:
      - DIRECT
      # - Proxy1

  - name: "Auto"
    type: url-test
    proxies:
      - DIRECT
      # - Proxy1
    url: "https://www.gstatic.com/generate_204"
    interval: 300

# 规则
rules:
  # 国内域名直连
  - DOMAIN-SUFFIX,cn,DIRECT
  - DOMAIN-KEYWORD,-cn,DIRECT

  # GeoIP 中国直连
  - GEOIP,CN,DIRECT

  # 最终规则
  - MATCH,Proxy